<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>➕ 心算挑战 - 小学生智力游戏</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #2e6b5e, #1e4f44);
            font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 600px;
            width: 100%;
            background: #fff8eb;
            border-radius: 72px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3);
            padding: 20px 25px 35px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ffb347, #ff7e05);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-top: 0;
        }
        .question {
            font-size: 2.8rem;
            background: white;
            display: inline-block;
            padding: 20px 35px;
            border-radius: 80px;
            box-shadow: 0 8px 0 #bb9244;
            margin: 20px 0;
            font-weight: bold;
        }
        .answer-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        .opt-btn {
            background: #ffcf7a;
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #9b601f;
            transition: 0.05s linear;
            font-family: monospace;
        }
        .opt-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #9b601f;
        }
        .feedback {
            font-size: 1.3rem;
            font-weight: bold;
            margin: 15px 0;
            padding: 10px;
            color: #e67e22;
        }
        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fbe5bf;
            border-radius: 50px;
            padding: 10px 20px;
            margin-top: 20px;
        }
        .reset-btn {
            background: #ff9f4b;
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: 5px 20px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #a25d1a;
        }
        .reset-btn:active {
            transform: translateY(2px);
        }
        footer {
            font-size: 0.7rem;
            margin-top: 20px;
            color: #7f6139;
        }
        @media (max-width: 500px) {
            .question { font-size: 2rem; padding: 12px 20px; }
            .opt-btn { font-size: 1.2rem; padding: 8px 20px; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🧠 心算挑战</h1>
    <div class="question" id="question">5 + 3 = ?</div>
    <div class="answer-area" id="options"></div>
    <div class="feedback" id="feedback">✨ 点击答案，快速计算 ✨</div>
    <div class="scoreboard">
        <span>🏆 得分：<strong id="score">0</strong></span>
        <button class="reset-btn" id="nextBtn">🎲 下一题</button>
    </div>
    <footer>⭐ 每答对一题 +10分，加油小小数学家！</footer>
</div>

<script>
    let currentScore = 0;
    let currentQuestion = "";
    let correctAnswer = null;
    let options = [];

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const feedbackEl = document.getElementById("feedback");
    const scoreSpan = document.getElementById("score");
    const nextBtn = document.getElementById("nextBtn");

    function generateQuestion() {
        const useAdd = Math.random() > 0.5;
        let a, b, ans;
        if (useAdd) {
            a = Math.floor(Math.random() * 13) + 1;  // 1~13
            b = Math.floor(Math.random() * (20 - a)) + 1;
            ans = a + b;
            currentQuestion = `${a} + ${b} = ?`;
        } else {
            a = Math.floor(Math.random() * 18) + 3;  // 3~20
            b = Math.floor(Math.random() * (a - 1)) + 1;
            ans = a - b;
            currentQuestion = `${a} - ${b} = ?`;
        }
        correctAnswer = ans;

        let optSet = new Set();
        optSet.add(ans);
        while (optSet.size < 3) {
            let offset = Math.floor(Math.random() * 5) - 2;
            let candidate = ans + offset;
            if (candidate >= 0 && candidate <= 30 && candidate !== ans) optSet.add(candidate);
            if (optSet.size < 3) optSet.add(ans + 1);
        }
        options = Array.from(optSet);
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        questionEl.innerText = currentQuestion;
        renderOptions();
    }

    function renderOptions() {
        optionsEl.innerHTML = "";
        options.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "opt-btn";
            btn.innerText = opt;
            btn.addEventListener("click", () => checkAnswer(opt));
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        if (selected === correctAnswer) {
            currentScore += 10;
            scoreSpan.innerText = currentScore;
            feedbackEl.innerHTML = "✅ 完全正确！ +10分 🌟 好棒！";
            feedbackEl.style.color = "#2b6b2b";
            generateQuestion();
        } else {
            feedbackEl.innerHTML = `❌ 不对哦，正确答案是 ${correctAnswer}，继续加油！`;
            feedbackEl.style.color = "#b13e3e";
            setTimeout(() => {
                if (feedbackEl.innerHTML.includes("不对")) {
                    feedbackEl.style.color = "#e67e22";
                    feedbackEl.innerHTML = "✨ 试试下一题吧！";
                }
            }, 1500);
        }
    }

    nextBtn.addEventListener("click", () => {
        generateQuestion();
        feedbackEl.innerHTML = "⭐ 新题目！快选答案～";
        feedbackEl.style.color = "#e67e22";
    });

    generateQuestion();
</script>
</body>
</html>
